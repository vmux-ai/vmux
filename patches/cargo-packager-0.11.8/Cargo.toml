[dependencies.toml]
version = "0.9"

[dependencies.tracing]
version = "0.1"

[dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter"]
optional = true

[dependencies.ureq]
version = "2.10"
default-features = false

[dependencies.walkdir]
version = "2"

[dependencies.zip]
version = "0.6"
