[target.'cfg(any(target_os = "linux", target_os = "dragonfly", target_os = "freebsd", target_os = "netbsd", target_os = "openbsd"))'.dependencies.heck]
version = "0.5"

[target.'cfg(any(target_os = "linux", target_os = "dragonfly", target_os = "freebsd", target_os = "netbsd", target_os = "openbsd"))'.dependencies.md5]
version = "0.7"

[target.'cfg(target_os = "windows")'.dependencies.once_cell]
version = "1"

[target.'cfg(target_os = "windows")'.dependencies.regex]
version = "1"

[target.'cfg(target_os = "windows")'.dependencies.uuid]
version = "1"
