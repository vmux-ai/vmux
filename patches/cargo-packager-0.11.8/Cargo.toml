[package]
edition = "2021"
name = "cargo-packager"
version = "0.11.8"
authors = [
    "CrabNebula Ltd.",
    "Tauri Programme within The Commons Conservancy",
    "George Burton <burtonageo@gmail.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Executable packager and bundler distributed as a CLI and library."
readme = "README.md"
keywords = [
    "bundle",
    "package",
    "cargo",
]
categories = [
    "command-line-interface",
    "command-line-utilities",
    "development-tools::cargo-plugins",
    "development-tools::build-utils",
    "os",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/crabnebula-dev/cargo-packager"

[package.metadata.docs.rs]
rustdoc-args = [
    "--cfg",
    "doc_cfg",
]
default-target = "x86_64-unknown-linux-gnu"
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
]

[features]
clap = [
    "dep:clap",
    "cargo-packager-utils/clap",
]
cli = [
    "clap",
    "dep:tracing-subscriber",
]
default = [
    "cli",
    "rustls-tls",
]
native-tls = ["ureq/native-tls"]
native-tls-vendored = [
    "native-tls",
    "native-tls/vendored",
]
rustls-tls = ["ureq/tls"]
schema = [
    "schemars",
    "cargo-packager-utils/schema",
]

[lib]
name = "cargo_packager"
path = "src/lib.rs"

[[bin]]
name = "cargo-packager"
path = "src/bin/cargo-packager.rs"
required-features = ["cli"]

[dependencies.base64]
version = "0.22"

[dependencies.cargo-packager-utils]
version = "0.1.1"
features = ["serde"]

[dependencies.cargo_metadata]
version = "0.18"

[dependencies.clap]
version = "4.5"
features = [
    "derive",
    "env",
]
optional = true

[dependencies.dirs]
version = "6.0"

[dependencies.dunce]
version = "1"

[dependencies.flate2]
version = "1.0"

[dependencies.glob]
version = "0.3"

[dependencies.handlebars]
version = "6.0"

[dependencies.hex]
version = "0.4"

[dependencies.icns]
version = "0.1"
