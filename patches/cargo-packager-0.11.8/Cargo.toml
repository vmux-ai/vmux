[dependencies.minisign]
version = "0.7"

[dependencies.native-tls]
version = "0.2"
optional = true

[dependencies.os_pipe]
version = "1"

[dependencies.plist]
version = "1"

[dependencies.relative-path]
version = "1.9"

[dependencies.schemars]
version = "0.8"
features = [
    "url",
    "preserve_order",
    "derive",
]
optional = true

[dependencies.semver]
version = "1"

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1.0"

[dependencies.sha1]
version = "0.10"

[dependencies.sha2]
version = "0.10"

[dependencies.strsim]
version = "0.11"

[dependencies.tar]
version = "0.4"

[dependencies.tempfile]
version = "3"

[dependencies.thiserror]
version = "1.0"

[dependencies.time]
version = "0.3"
