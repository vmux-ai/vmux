[package]
name = "vmux_team"
description = "Team / profiles (user + agents)"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = []
web = []

[lib]
path = "src/lib.rs"

[dependencies]
rkyv = { workspace = true }
serde = { workspace = true }
vmux_core = { path = "../vmux_core" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true }
bevy_ecs = { workspace = true }
ron = { workspace = true }
vmux_agent = { path = "../vmux_agent" }
vmux_command = { path = "../vmux_command" }
vmux_layout = { path = "../vmux_layout" }
vmux_space = { path = "../vmux_space" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
vmux_ui = { path = "../vmux_ui", default-features = false }
wasm-bindgen = { workspace = true }
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement"] }
