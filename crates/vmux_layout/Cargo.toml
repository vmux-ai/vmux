[package]
name = "vmux_layout"
description = "Bevy layout shell and single CEF chrome webview"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[features]
default = []
debug = []
web = []

[[bin]]
name = "vmux_layout_app"
path = "src/main.rs"
required-features = ["web"]

[lib]
path = "src/lib.rs"

[build-dependencies]
vmux_webview_app = { path = "../vmux_webview_app", features = ["build"] }

[dependencies]
rkyv = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
vmux_core = { path = "../vmux_core" }
vmux_space = { path = "../vmux_space" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy = { workspace = true, features = [
    "bevy_camera_controller",
    "free_camera",
] }
bevy_asset = "0.18"
bevy_cef = { workspace = true }
bevy_cef_core = { workspace = true }
bevy_ecs = { workspace = true }
bevy_reflect = { workspace = true }
bevy_render = "0.18"
bevy_winit = { workspace = true }
libc = "0.2"
moonshine-save = { workspace = true }
raw-window-handle = "0.6"
rfd = { workspace = true }
ron = { workspace = true }
vmux_command = { path = "../vmux_command" }
vmux_history = { path = "../vmux_history" }
vmux_webview_app = { path = "../vmux_webview_app" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
vmux_ui = { path = "../vmux_ui", default-features = false }
wasm-bindgen = "0.2.115"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement", "CssStyleDeclaration"] }
