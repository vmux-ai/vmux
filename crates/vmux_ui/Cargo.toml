[package]
name = "vmux_ui"
description = "vmux — Dioxus WASM UI library (webview components, CEF hooks)"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[features]
default = []
gallery = ["dep:regex", "dep:sha2"]

[dependencies]
fluent-bundle = { workspace = true }
rkyv = { workspace = true }
serde = { workspace = true }
unic-langid = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sys-locale = { workspace = true }

[build-dependencies]
regex = { workspace = true, optional = true }
sha2 = { version = "0.10", optional = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "vmux_ui"
path = "src/main.rs"

[target.'cfg(target_arch = "wasm32")'.dependencies]
vmux_core = { path = "../vmux_core" }
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement", "Node",
    "CssStyleDeclaration", "DomRect",
    "EventTarget", "Event", "HtmlTextAreaElement", "KeyboardEvent",
    "Navigator",
] }
dioxus = { workspace = true }
time = { version = "0.3", default-features = false, features = [
    "wasm-bindgen",
] }
dioxus-primitives = { git = "https://github.com/DioxusLabs/components", package = "dioxus-primitives", rev = "ccdb07f69383de008a0afadda0e5ab7ec14c1a9c", default-features = false, features = [
    "router",
    "web",
] }
ron = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wasm-bindgen = "0.2.115"
