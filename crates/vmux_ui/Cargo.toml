[package]
name = "vmux_ui"
description = "vmux — Dioxus WASM UI library (webview components, CEF hooks)"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[dependencies]
serde = { workspace = true }

[build-dependencies]
vmux_webview_app = { path = "../vmux_webview_app", features = ["build"] }

[lib]
path = "src/lib.rs"

[[bin]]
name = "vmux_ui"
path = "src/main.rs"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Window"] }
dioxus = { workspace = true }
time = { version = "0.3", default-features = false, features = [
    "wasm-bindgen",
] }
dioxus-primitives = { git = "https://github.com/DioxusLabs/components", package = "dioxus-primitives", rev = "ccdb07f69383de008a0afadda0e5ab7ec14c1a9c", default-features = true, features = [
    "web",
] }
ron = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
wasm-bindgen = "0.2.115"
