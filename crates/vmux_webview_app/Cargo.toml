[package]
name = "vmux_webview_app"
description = "Bevy plugin: embed Dioxus-style dist/ and assets/ trees for CEF webviews"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = []
build = ["dep:regex"]

[dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true }
bevy_cef_core = { workspace = true }
serde = { workspace = true }
regex = { workspace = true, optional = true }
