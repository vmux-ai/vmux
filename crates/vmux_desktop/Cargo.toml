[package]
name = "vmux_desktop"
version.workspace = true
edition.workspace = true
publish = false

[features]
debug = []

[[bin]]
name = "Vmux"
path = "src/main.rs"

[dependencies]
bevy = { workspace = true, features = [
    "bevy_camera_controller",
    "free_camera",
] }
bevy_cef = { workspace = true, features = ["debug"] }
bevy_cef_core = { workspace = true }
bevy_infinite_grid = "0.18"
libc = "0.2"
bevy_log = "0.18"
directories = "5"
muda = "0.17"
parking_lot = "0.12"
bevy_reflect = { workspace = true }
moonshine-save = { workspace = true }
ron = { workspace = true }
serde = { workspace = true }
vmux_history = { path = "../vmux_history" }
vmux_header = { path = "../vmux_header" }
vmux_side_sheet = { path = "../vmux_side_sheet" }
vmux_command_palette = { path = "../vmux_command_palette" }
vmux_macro = { path = "../vmux_macro" }
vmux_webview_app = { path = "../vmux_webview_app" }

[target.'cfg(target_os = "macos")'.dependencies]
liquid-glass-rs = "0.1.1"
raw-window-handle = "0.6"
