[package]
name = "vmux_desktop"
version.workspace = true
edition.workspace = true
publish = false

[features]
debug = []

[[bin]]
name = "Vmux"
path = "src/main.rs"

[dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true, features = ["debug"] }
bevy_log = "0.18"
directories = "5"
muda = "0.17"
parking_lot = "0.12"
ron = { workspace = true }
serde = { workspace = true }
strum = { version = "0.27", features = ["derive"] }
vmux_history = { path = "../vmux_history" }
vmux_macro = { path = "../vmux_macro" }
vmux_webview_app = { path = "../vmux_webview_app" }

[target.'cfg(target_os = "macos")'.dependencies]
liquid-glass-rs = "0.1.1"
raw-window-handle = "0.6"
