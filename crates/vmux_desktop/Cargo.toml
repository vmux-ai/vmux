[package]
name = "vmux_desktop"
version.workspace = true
edition.workspace = true
publish = false

[features]
debug = []

[[bin]]
name = "vmux_desktop"
path = "src/main.rs"

[dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true, features = ["debug"] }
bevy_log = "0.18"
directories = "5"
ron = { workspace = true }
serde = { workspace = true }
vmux_history = { path = "../vmux_history" }
vmux_webview_app = { path = "../vmux_webview_app" }

[target.'cfg(target_os = "macos")'.dependencies]
liquid-glass-rs = "0.1.1"
raw-window-handle = "0.6"
