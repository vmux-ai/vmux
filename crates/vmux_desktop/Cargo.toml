[package]
name = "vmux_desktop"
version.workspace = true
edition.workspace = true
description.workspace = true
publish = false

[features]
debug = ["bevy_cef/debug"]

[[bin]]
name = "vmux_desktop"
path = "src/main.rs"

[dependencies]
bevy = { workspace = true, features = [
    "bevy_camera_controller",
    "free_camera",
] }
bevy_cef = { workspace = true }
bevy_cef_core = { workspace = true }

libc = "0.2"
muda = "0.19"
parking_lot = "0.12"
bevy_reflect = { workspace = true }
moonshine-save = { workspace = true }
ron = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
vmux_agent = { path = "../vmux_agent" }
vmux_core = { path = "../vmux_core" }
vmux_history = { path = "../vmux_history" }
vmux_layout = { path = "../vmux_layout" }
vmux_command = { path = "../vmux_command" }
vmux_macro = { path = "../vmux_macro" }
vmux_ui = { path = "../vmux_ui", default-features = false }
tokio = { workspace = true }
uuid = { workspace = true }
tracing = "0.1"
vmux_service = { path = "../vmux_service" }
vmux_space = { path = "../vmux_space" }
vmux_terminal = { path = "../vmux_terminal" }
vmux_settings = { path = "../vmux_settings" }
vmux_webview_app = { path = "../vmux_webview_app" }
url = { workspace = true }

rfd = { workspace = true }
notify = { workspace = true }
tempfile = "3"
semver = "1"
cargo-packager-updater = "0.2"
tray-icon = "0.24"

[package.metadata.packager]
product-name = "Vmux"
identifier = "ai.vmux.desktop"
category = "Productivity"
copyright = "Copyright 2024-2025 Junichi Sugiura. MIT License."
homepage = "https://vmux.ai"
formats = ["app", "dmg"]
icons = ["../../packaging/macos/Vmux.icns"]
before-packaging-command = "env -u CEF_PATH cargo build -p vmux_desktop -p vmux_cli -p vmux_service -p bevy_cef_debug_render_process --release"
before-each-package-command = "bash ../../scripts/before-each-package.sh"
binaries = [
    { path = "vmux_desktop", main = true },
    { path = "vmux" },
    { path = "vmux_service" },
]

[package.metadata.packager.dmg]
background = "../../packaging/macos/dmg-background.png"

window-size = { width = 660, height = 400 }
app-position = { x = 180, y = 180 }
application-folder-position = { x = 480, y = 180 }

[package.metadata.packager.macos]
minimum-system-version = "13.0"
entitlements = "../../packaging/macos/Vmux.entitlements"
