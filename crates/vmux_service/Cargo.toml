[package]
name = "vmux_service"
version.workspace = true
edition.workspace = true
description = "Background service hosting persistent terminal processes (and its monitor webview)"
publish = false
build = "build.rs"

[features]
default = []
web = []

[[bin]]
name = "vmux_service"
path = "src/main.rs"

[lib]
name = "vmux_service"
path = "src/lib.rs"

[dependencies]
rkyv = { workspace = true }
serde = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
base64 = "0.22"
bevy = { workspace = true }
bevy_ecs = { workspace = true }
libc = "0.2"
tokio = { workspace = true, features = ["process", "io-util"] }
alacritty_terminal = { workspace = true }
vte = "0.15"
portable-pty = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"
chrono = { workspace = true }
serde_json = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
crossbeam-channel = "0.5"
futures-util = "0.3"
axum = "0.8"
mime_guess = "2"
vmux_core = { path = "../vmux_core" }
vmux_layout = { path = "../vmux_layout" }
vmux_service_client = { path = "../vmux_service_client" }
vmux_wire = { path = "../vmux_wire" }
agent-client-protocol = "1.0.1"
tokio-util = { version = "0.7", features = ["compat"] }
tempfile = "3.27.0"
uuid = { workspace = true }
url = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
futures-util = "0.3"
gloo-net = "0.6"
gloo-timers = { version = "0.3", features = ["futures"] }
serde_json = { workspace = true }
vmux_ui = { path = "../vmux_ui", default-features = false }
vmux_wire = { path = "../vmux_wire" }
wasm-bindgen = { workspace = true }
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "EventSource",
    "History",
    "HtmlElement",
    "HtmlTextAreaElement",
    "Location",
    "MessageEvent",
    "Navigator",
    "ServiceWorkerContainer",
    "Window",
] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2-foundation = { version = "0.3", default-features = false, features = [
    "std",
    "NSString",
] }
objc2-service-management = { version = "0.3", default-features = false, features = [
    "std",
    "SMAppService",
    "objc2",
    "objc2-foundation",
] }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util", "macros", "rt"] }
mockito = "1"
serial_test = "3"
