[package]
name = "vmux_service"
version.workspace = true
edition.workspace = true
description = "Background service hosting persistent terminal processes"
publish = false

[[bin]]
name = "vmux-service"
path = "src/main.rs"

[lib]
name = "vmux_service"
path = "src/lib.rs"

[dependencies]
libc = "0.2"
rkyv = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
alacritty_terminal = { workspace = true }
portable-pty = { workspace = true }
vmux_terminal = { path = "../vmux_terminal" }
