[package]
name = "vmux_service"
version.workspace = true
edition.workspace = true
description = "Background service hosting persistent terminal processes (and its monitor webview)"
publish = false
build = "build.rs"

[features]
default = []
web = []

[[bin]]
name = "vmux_service"
path = "src/main.rs"

[[bin]]
name = "vmux_service_app"
path = "src/webview/main.rs"
required-features = ["web"]

[lib]
name = "vmux_service"
path = "src/lib.rs"

[build-dependencies]
vmux_page = { path = "../vmux_page", features = ["build"] }

[dependencies]
rkyv = { workspace = true }
serde = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy = { workspace = true }
bevy_ecs = { workspace = true }
libc = "0.2"
uuid = { workspace = true }
tokio = { workspace = true }
alacritty_terminal = { workspace = true }
portable-pty = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"
vmux_core = { path = "../vmux_core" }
vmux_layout = { path = "../vmux_layout" }

vmux_page = { path = "../vmux_page" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
vmux_ui = { path = "../vmux_ui", default-features = false }
wasm-bindgen = { workspace = true }
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-service-management = "0.3"

[dev-dependencies]
serde_json = { workspace = true }
tempfile = "3.27.0"
