[package]
name = "vmux_status_bar"
description = "Status bar: Dioxus WASM UI + re-exports hosted status plugin from vmux_ui"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[lib]
path = "src/lib.rs"

[[bin]]
name = "vmux_status_bar"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
url = "2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
vmux_core = { path = "../vmux_core" }
vmux_layout = { path = "../vmux_layout" }
vmux_ui = { path = "../vmux_ui", default-features = false, features = ["bevy"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
ron = { workspace = true }
vmux_ui = { path = "../vmux_ui", default-features = false }
# Keep in sync with `wasm-bindgen` CLI used by `build.rs` (same as `vmux_history`).
wasm-bindgen = "0.2.115"
