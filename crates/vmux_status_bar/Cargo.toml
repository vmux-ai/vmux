[package]
name = "vmux_status_bar"
description = "Status bar: Dioxus WASM UI + re-exports hosted status plugin from vmux_ui_native"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[build-dependencies]
vmux_utils = { path = "../vmux_utils" }

[lib]
path = "src/lib.rs"

[[bin]]
name = "vmux_status_bar"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
url = "2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
vmux_core = { path = "../vmux_core" }
vmux_layout = { path = "../vmux_layout" }
vmux_ui_native = { path = "../vmux_ui_native" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
ron = { workspace = true }
vmux_ui = { path = "../vmux_ui", default-features = false }
# Keep in sync with `wasm-bindgen` emitted by `dx` / Dioxus (see Cargo.lock).
wasm-bindgen = "0.2.115"
