<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width"/>
  <title>vmux history POC</title>
  <style>html,body{margin:0;height:100%;background:#171717}</style>
  <link rel="modulepreload" href="__VMUX_DX_ENTRY__" crossorigin="anonymous"/>
  <link rel="preload" href="__VMUX_DX_WASM__" as="fetch" type="application/wasm" crossorigin="anonymous"/>
</head>
<body class="h-full min-h-0">
  <div id="main" class="h-full min-h-0"></div>
  <!-- Single bootstrap: generated `vmux_history_app` web bundle already runs `__wbg_init` on load.
       Do not also `import …; await init()` — that double-starts WASM and mounts Dioxus twice. -->
  <script type="module" async src="__VMUX_DX_ENTRY__"></script>
</body>
</html>
