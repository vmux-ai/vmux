[package]
name = "vmux"
description = "vmux — Bevy + embedded CEF webview"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "vmux"
path = "src/main.rs"

[features]
default = []
debug = ["bevy_cef/debug"]

[dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true }
leafwing-input-manager = { workspace = true }
