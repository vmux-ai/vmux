[package]
name = "vmux_terminal"
description = "Bevy + CEF + Dioxus terminal webview"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[features]
default = []
web = []

[[bin]]
name = "vmux_terminal_app"
path = "src/main.rs"
required-features = ["web"]

[lib]
path = "src/lib.rs"

[build-dependencies]
vmux_webview_app = { path = "../vmux_webview_app", features = ["build"] }

[dependencies]
serde = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true }
vmux_webview_app = { path = "../vmux_webview_app" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true }
js-sys = "0.3"
unicode-width = "0.2"
vmux_ui = { path = "../vmux_ui", default-features = false }
wasm-bindgen = { workspace = true }
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement", "Node",
    "DomRect", "CssStyleDeclaration",
    "ResizeObserver", "ResizeObserverEntry",
] }
