[package]
name = "vmux_agent"
description = "Agent CLI strategies (vibe, claude, codex) and shared session ECS abstractions"
version.workspace = true
edition.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
bevy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
notify = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
crossbeam-channel = "0.5"
futures-lite = "2"
vmux_core = { path = "../vmux_core" }
vmux_layout = { path = "../vmux_layout" }
vmux_service = { path = "../vmux_service" }
vmux_terminal = { path = "../vmux_terminal" }
