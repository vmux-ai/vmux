[package]
name = "vmux_server"
description = "Bevy plugin: serve embedded webview pages over vmux:// URLs"
version.workspace = true
edition.workspace = true
publish = false
build = "build.rs"

[features]
default = []
build = ["dep:regex", "dep:sha2"]
web = [
    "dep:dioxus",
    "dep:vmux_agent",
    "dep:vmux_editor",
    "dep:vmux_history",
    "dep:vmux_layout",
    "dep:vmux_service",
    "dep:vmux_setting",
    "dep:vmux_space",
    "dep:vmux_team",
    "dep:vmux_terminal",
    "dep:web-sys",
]

[dependencies]
regex = { workspace = true, optional = true }
sha2 = { version = "0.10", optional = true }
vmux_core = { path = "../vmux_core" }

[build-dependencies]
regex = { workspace = true }
sha2 = "0.10"

[[bin]]
name = "vmux_server"
path = "src/main.rs"
required-features = ["web"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
dioxus = { workspace = true, optional = true }
vmux_agent = { path = "../vmux_agent", optional = true }
vmux_editor = { path = "../vmux_editor", optional = true }
vmux_history = { path = "../vmux_history", optional = true }
vmux_layout = { path = "../vmux_layout", optional = true }
vmux_service = { path = "../vmux_service", optional = true }
vmux_setting = { path = "../vmux_setting", optional = true }
vmux_space = { path = "../vmux_space", optional = true }
vmux_team = { path = "../vmux_team", optional = true }
vmux_terminal = { path = "../vmux_terminal", optional = true }
web-sys = { version = "0.3", features = ["Location", "Window"], optional = true }
