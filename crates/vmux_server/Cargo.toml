[package]
name = "vmux_server"
description = "Bevy plugin: serve embedded webview pages over vmux:// URLs"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = []
build = ["dep:regex"]

[dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true }
bevy_cef_core = { workspace = true }
rkyv = { workspace = true }
serde = { workspace = true }
regex = { workspace = true, optional = true }
