# Workspace root package holds repo-level `examples/`; member crates live under `crates/`.
[package]
name = "vmux"
version.workspace = true
edition.workspace = true
publish = false

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
bevy = { workspace = true }
bevy_cef = { workspace = true, features = ["debug"] }
bevy_ecs = { workspace = true }
chrono = { workspace = true }
ron = { workspace = true }
url = { workspace = true }
vmux_history = { path = "crates/vmux_history" }
vmux_webview_app = { path = "crates/vmux_webview_app" }

[workspace]
members = [".", "crates/*", "patches/*"]
default-members = ["crates/vmux_desktop"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
bevy = { version = "0.18", default-features = true, features = ["https"] }
bevy_ecs = { version = "0.18", default-features = true }
bevy_winit = { version = "0.18", default-features = true }
bevy_cef = "0.5.2"
bevy_cef_core = "0.5.2"
leafwing-input-manager = "0.20"
moonshine-save = "0.6.1"
tokio = { version = "1", features = [
    "rt-multi-thread",
    "sync",
    "macros",
    "net",
] }
axum = { version = "0.7", default-features = false, features = [
    "http1",
    "tokio",
] }
tower-http = { version = "0.5", features = ["fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.8"
chrono = { version = "0.4", default-features = false, features = [
    "clock",
    "std",
] }
url = "2"
crossbeam-channel = "0.5"
notify = "6"
dioxus = { version = "0.7.4", features = ["web"] }

[profile.release.package.vmux_history]
opt-level = "z"
codegen-units = 1

[profile.release.package.vmux_ui]
opt-level = "z"
codegen-units = 1

[profile.release.package.vmux_ui_native]
opt-level = "z"
codegen-units = 1

[patch.crates-io]
winit = { path = "patches/winit-0.30.13" }
wgpu-hal = { path = "patches/wgpu-hal-27.0.4" }
bevy_cef = { path = "patches/bevy_cef-0.5.2" }
bevy_cef_core = { path = "patches/bevy_cef_core-0.5.2" }
