# Workspace layout mirrors [Bevy](https://github.com/bevyengine/bevy/): virtual root; crate dirs use underscores (`crates/vmux_input`, etc.).
[workspace]
members = [
    "crates/vmux_core",
    "crates/vmux_input",
    "crates/vmux",
    "crates/vmux_webview",
]
default-members = ["crates/vmux"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
bevy = { version = "0.18", default-features = true }
bevy_cef = "0.5.2"
leafwing-input-manager = "0.20"
# Session persistence: `bevy_save` on crates.io targets Bevy 0.16.x; vmux uses Bevy 0.18, so we use moonshine-save.
moonshine-save = "0.6.1"

[patch.crates-io]
winit = { path = "patches/winit-0.30.13" }
bevy_cef = { path = "patches/bevy_cef-0.5.2" }
bevy_cef_core = { path = "patches/bevy_cef_core-0.5.2" }
