name: API Docs Freshness

# Verifies the committed API model (docs/api/*.json) is in sync with the code by
# regenerating it from rustdoc JSON and failing if the result differs.
#
# This job compiles the workspace under a pinned nightly (rustdoc JSON is nightly
# only), which is heavy (bevy/CEF). It is therefore manual-first (workflow_dispatch).
# Once it has been confirmed green, enable the pull_request trigger below and add it
# to branch protection to make staleness blocking.
on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - 'crates/**'
  #     - 'vmux_docs/**'
  #     - 'docs/api/**'
  #     - 'Cargo.toml'
  #     - 'Cargo.lock'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DOCS_NIGHTLY: nightly-2026-06-26

jobs:
  cef-version:
    name: Resolve CEF version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve cef crate version from Cargo.lock
        id: resolve
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^name = "cef"$/{getline; print $2; exit}' Cargo.lock)
          if [ -z "${version:-}" ]; then
            echo "::error file=Cargo.lock::could not resolve 'cef' crate version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  freshness:
    name: API model is fresh
    runs-on: ubuntu-latest
    needs: cef-version
    env:
      CEF_VERSION: ${{ needs.cef-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Install pinned doc nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.DOCS_NIGHTLY }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-docs
          cache-all-crates: true

      - name: Cache CEF framework
        uses: actions/cache@v4
        with:
          path: ~/.local/share/Chromium Embedded Framework.framework
          key: cef-${{ runner.os }}-${{ env.CEF_VERSION }}

      - name: Install CEF framework
        run: |
          if [ ! -d "$HOME/.local/share/Chromium Embedded Framework.framework" ]; then
            command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@${{ env.CEF_VERSION }}
            export-cef-dir --force "$HOME/.local/share"
          fi

      - name: Regenerate API model
        run: env -u CEF_PATH make api-docs

      - name: Fail if committed model is stale
        run: |
          if ! git diff --exit-code docs/api/; then
            echo "::error::docs/api is stale. Run 'make api-docs' and commit the result."
            exit 1
          fi
