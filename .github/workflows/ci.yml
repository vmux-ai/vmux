name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: |
          # Exclude vendored patches from formatting checks
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.manifest_path | test("patches") | not) | .name')
          for pkg in $PKGS; do
            cargo fmt -p "$pkg" -- --check
          done

      - name: Install CEF framework
        run: |
          command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@145.6.1+145.0.28
          export-cef-dir --force "$HOME/.local/share"

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Install tailwindcss
        run: |
          if ! command -v tailwindcss >/dev/null 2>&1; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-linux-x64
            chmod +x tailwindcss-linux-x64
            sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
          fi

      - name: Clippy
        run: |
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.manifest_path | test("patches") | not) | .name')
          for pkg in $PKGS; do
            env -u CEF_PATH cargo clippy -p "$pkg" --all-targets -- -D warnings
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install CEF framework
        run: |
          command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@145.6.1+145.0.28
          export-cef-dir --force "$HOME/.local/share"

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Install tailwindcss
        run: |
          if ! command -v tailwindcss >/dev/null 2>&1; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-linux-x64
            chmod +x tailwindcss-linux-x64
            sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
          fi

      - name: Run tests
        run: env -u CEF_PATH cargo test --workspace --exclude bevy_cef_core

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            website:
              - 'website/**'

  website:
    name: Website Build
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            website/target
          key: website-ci-${{ hashFiles('website/Cargo.lock') }}
          restore-keys: website-ci-

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Build website
        working-directory: website
        run: dx build --platform web --release

  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    env:
      HAS_SIGNING_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install CEF framework
        run: |
          command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@145.6.1+145.0.28
          export-cef-dir --force "$HOME/.local/share"

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Install bevy_cef_bundle_app
        run: command -v bevy_cef_bundle_app >/dev/null 2>&1 || cargo install bevy_cef_bundle_app --locked

      - name: Install cargo-packager
        run: command -v cargo-packager >/dev/null 2>&1 || cargo install cargo-packager --locked

      - name: Install tailwindcss
        run: |
          if ! command -v tailwindcss >/dev/null 2>&1; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-macos-arm64
            chmod +x tailwindcss-macos-arm64
            sudo mv tailwindcss-macos-arm64 /usr/local/bin/tailwindcss
          fi

      - name: Strip signing config for CI
        run: |
          sed -i '' '/signing-identity/d' crates/vmux_desktop/Cargo.toml

      - name: Package
        run: env -u CEF_PATH cargo packager --release

      - name: Import signing certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_FILE"

      - name: Sign and notarize
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/sign-and-notarize.sh

      - name: Re-create .dmg from signed .app
        if: env.HAS_SIGNING_CERT == 'true'
        run: |
          rm -f target/release/*.dmg
          hdiutil create -volname "Vmux" \
            -srcfolder target/release/Vmux.app \
            -ov -format UDZO \
            target/release/Vmux.dmg

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Vmux-${{ github.sha }}.dmg
          path: target/release/*.dmg
          retention-days: 7
