name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'Casks/**'
      - 'website/public/updates.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: |
          # Exclude vendored patches from formatting checks
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.manifest_path | test("patches") | not) | .name')
          for pkg in $PKGS; do
            cargo fmt -p "$pkg" -- --check
          done

      - name: Install CEF framework
        run: |
          command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@145.6.1+145.0.28
          export-cef-dir --force "$HOME/.local/share"

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Install tailwindcss
        run: |
          if ! command -v tailwindcss >/dev/null 2>&1; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-linux-x64
            chmod +x tailwindcss-linux-x64
            sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
          fi

      - name: Clippy
        run: |
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.manifest_path | test("patches") | not) | .name')
          for pkg in $PKGS; do
            env -u CEF_PATH cargo clippy -p "$pkg" --all-targets -- -D warnings
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install CEF framework
        run: |
          command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@145.6.1+145.0.28
          export-cef-dir --force "$HOME/.local/share"

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Install tailwindcss
        run: |
          if ! command -v tailwindcss >/dev/null 2>&1; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-linux-x64
            chmod +x tailwindcss-linux-x64
            sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
          fi

      - name: Run tests
        run: env -u CEF_PATH cargo test --workspace --exclude bevy_cef_core

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.filter.outputs.website }}
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            website:
              - 'website/**'
            packaging:
              - 'scripts/**'
              - 'patches/**'
              - 'packaging/**'
              - 'Cargo.toml'
              - 'crates/vmux_desktop/Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/release.yml'
              - '.github/workflows/ci.yml'

  website:
    name: Website Build
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            website/target
          key: website-ci-${{ hashFiles('website/Cargo.lock') }}
          restore-keys: website-ci-

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Build website
        working-directory: website
        run: dx build --platform web --release

  build-mac:
    name: Build macOS App
    needs: changes
    if: needs.changes.outputs.packaging == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install CEF framework
        run: |
          command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@145.6.1+145.0.28
          export-cef-dir --force "$HOME/.local/share"

      - name: Install dioxus-cli
        run: command -v dx >/dev/null 2>&1 || cargo install dioxus-cli --locked --version 0.7.4

      - name: Install bevy_cef tools
        run: |
          command -v bevy_cef_render_process >/dev/null 2>&1 || cargo install bevy_cef_render_process
          command -v bevy_cef_bundle_app >/dev/null 2>&1 || cargo install bevy_cef_bundle_app

      - name: Install cargo-packager (patched for macOS Tahoe)
        run: cargo install --path patches/cargo-packager-0.11.8

      - name: Install tailwindcss
        run: |
          if ! command -v tailwindcss >/dev/null 2>&1; then
            curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-macos-arm64
            chmod +x tailwindcss-macos-arm64
            sudo mv tailwindcss-macos-arm64 /usr/local/bin/tailwindcss
          fi

      - name: Build, sign, notarize, and package DMG
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VMUX_UPDATE_PUBLIC_KEY: ${{ secrets.VMUX_UPDATE_PUBLIC_KEY }}
        run: ./scripts/build-mac-release.sh

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Vmux-${{ github.sha }}.dmg
          path: target/release/Vmux_*.dmg
          retention-days: 7
