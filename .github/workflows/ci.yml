name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'Casks/**'
      - 'website/public/updates.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TAILWINDCSS_VERSION: "4.2.4"
  DIOXUS_CLI_VERSION: "0.7.4"
  BINARYEN_VERSION: "127"
  DX_HOME: ${{ github.workspace }}/.dx

jobs:
  cef-version:
    name: Resolve CEF version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve cef crate version from Cargo.lock
        id: resolve
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^name = "cef"$/{getline; print $2; exit}' Cargo.lock)
          if [ -z "${version:-}" ]; then
            echo "::error file=Cargo.lock::could not resolve 'cef' crate version"
            exit 1
          fi
          echo "Resolved CEF version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  lint-rust:
    name: Lint (rust)
    runs-on: ubuntu-latest
    needs: [cef-version, changes]
    if: needs.changes.outputs.code == 'true'
    env:
      CEF_VERSION: ${{ needs.cef-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Cache cargo binaries
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-dx${{ env.DIOXUS_CLI_VERSION }}-cef${{ env.CEF_VERSION }}-v3

      - name: Cache CEF framework
        uses: actions/cache@v5
        with:
          path: ~/.local/share/Chromium Embedded Framework.framework
          key: cef-${{ runner.os }}-${{ env.CEF_VERSION }}

      - name: Cache tailwindcss
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/tailwindcss
          key: tailwindcss-${{ runner.os }}-${{ env.TAILWINDCSS_VERSION }}

      - name: Add ~/.local/bin to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Compute workspace packages (excluding patches)
        id: pkgs
        run: |
          ARGS=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.manifest_path | test("patches") | not) | "-p " + .name' \
            | tr '\n' ' ')
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt ${{ steps.pkgs.outputs.args }} -- --check

      - name: Install CEF framework
        run: |
          if [ ! -d "$HOME/.local/share/Chromium Embedded Framework.framework" ]; then
            command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@${{ env.CEF_VERSION }}
            export-cef-dir --force "$HOME/.local/share"
          fi

      - name: Install dioxus-cli
        run: ./scripts/install-dioxus-cli.sh

      - name: Install tailwindcss
        run: TAILWINDCSS_INSTALL_DIR="$HOME/.local/bin" ./scripts/install-tailwindcss.sh

      - name: Clippy
        run: env -u CEF_PATH VMUX_SKIP_DX_BUILD=1 cargo clippy ${{ steps.pkgs.outputs.args }} --all-targets -- -D warnings

  test-rust:
    name: Test (rust)
    runs-on: ubuntu-latest
    needs: [cef-version, changes]
    if: needs.changes.outputs.code == 'true'
    env:
      CEF_VERSION: ${{ needs.cef-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/local/share/chromium /usr/local/share/edge
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libxdo-dev \
            libvulkan-dev

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Cache cargo binaries
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-dx${{ env.DIOXUS_CLI_VERSION }}-cef${{ env.CEF_VERSION }}-v3

      - name: Cache CEF framework
        uses: actions/cache@v5
        with:
          path: ~/.local/share/Chromium Embedded Framework.framework
          key: cef-${{ runner.os }}-${{ env.CEF_VERSION }}

      - name: Cache tailwindcss
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/tailwindcss
          key: tailwindcss-${{ runner.os }}-${{ env.TAILWINDCSS_VERSION }}

      - name: Add ~/.local/bin to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install CEF framework
        run: |
          if [ ! -d "$HOME/.local/share/Chromium Embedded Framework.framework" ]; then
            command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@${{ env.CEF_VERSION }}
            export-cef-dir --force "$HOME/.local/share"
          fi

      - name: Install dioxus-cli
        run: ./scripts/install-dioxus-cli.sh

      - name: Install tailwindcss
        run: TAILWINDCSS_INSTALL_DIR="$HOME/.local/bin" ./scripts/install-tailwindcss.sh

      - name: Run tests
        run: env -u CEF_PATH cargo test --workspace --exclude bevy_cef_core --exclude bevy_cef

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.filter.outputs.website }}
      packaging: ${{ steps.filter.outputs.packaging }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'patches/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            website:
              - 'website/**'
            packaging:
              - 'scripts/**'
              - 'patches/**'
              - 'packaging/**'
              - 'Cargo.toml'
              - 'crates/vmux_desktop/Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/release.yml'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes, lint-rust]
    if: always()
    steps:
      - name: Gate
        env:
          CHANGES: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          RESULT: ${{ needs.lint-rust.result }}
        run: |
          if [ "$CHANGES" != "success" ]; then
            echo "::error::Detect Changes did not succeed ($CHANGES)"
            exit 1
          fi
          if [ "$CODE" = "true" ] && [ "$RESULT" != "success" ]; then
            echo "::error::Lint (rust) result: $RESULT"
            exit 1
          fi
          echo "Lint gate ok (code=$CODE rust=$RESULT)"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, test-rust]
    if: always()
    steps:
      - name: Gate
        env:
          CHANGES: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          RESULT: ${{ needs.test-rust.result }}
        run: |
          if [ "$CHANGES" != "success" ]; then
            echo "::error::Detect Changes did not succeed ($CHANGES)"
            exit 1
          fi
          if [ "$CODE" = "true" ] && [ "$RESULT" != "success" ]; then
            echo "::error::Test (rust) result: $RESULT"
            exit 1
          fi
          echo "Test gate ok (code=$CODE rust=$RESULT)"

  build-macos:
    name: Build macOS
    runs-on: ubuntu-latest
    needs: [changes, build-mac]
    if: always()
    steps:
      - name: Gate
        env:
          CHANGES: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          PACKAGING: ${{ needs.changes.outputs.packaging }}
          RESULT: ${{ needs.build-mac.result }}
        run: |
          if [ "$CHANGES" != "success" ]; then
            echo "::error::Detect Changes did not succeed ($CHANGES)"
            exit 1
          fi
          if { [ "$CODE" = "true" ] || [ "$PACKAGING" = "true" ]; } && [ "$RESULT" != "success" ]; then
            echo "::error::Build macOS App result: $RESULT"
            exit 1
          fi
          echo "Build macOS gate ok (code=$CODE packaging=$PACKAGING build=$RESULT)"

  website:
    name: Website Build
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: website
          shared-key: website

      - name: Cache binaryen
        uses: actions/cache@v5
        with:
          path: .dx/tools/binaryen-${{ env.BINARYEN_VERSION }}
          key: binaryen-${{ runner.os }}-${{ runner.arch }}-${{ env.BINARYEN_VERSION }}

      - name: Install dioxus-cli
        run: ./scripts/install-dioxus-cli.sh

      - name: Install binaryen
        run: ./scripts/install-dioxus-binaryen.sh

      - name: Build website
        working-directory: website
        run: dx build --platform web --release

  build-mac:
    name: Build macOS App
    needs: [changes, cef-version]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.packaging == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CEF_VERSION: ${{ needs.cef-version.outputs.version }}
      VMUX_CEF_SDK_CACHE: ${{ github.workspace }}/.cache/cef-sdk
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect release PR + idempotency
        id: relprep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG="v$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

          if [ -z "${BASE_SHA:-}" ]; then
            echo "Not a pull_request event; skipping release prep."
            echo "IS_RELEASE_PR=0" >> "$GITHUB_ENV"
            exit 0
          fi

          BASE_VERSION=$(git show "${BASE_SHA}:Cargo.toml" 2>/dev/null | grep -m1 '^version' | sed 's/.*"\(.*\)".*/\1/' || true)
          if [ "$BASE_VERSION" = "$VERSION" ]; then
            echo "Version unchanged ($VERSION); not a release PR."
            echo "IS_RELEASE_PR=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Release PR detected: $BASE_VERSION -> $VERSION"
          echo "IS_RELEASE_PR=1" >> "$GITHUB_ENV"

          if gh release view "$TAG" --json isDraft,assets >/tmp/r.json 2>/dev/null; then
            asset_count=$(jq '.assets | length' /tmp/r.json)
            CASK_URL=$(grep -m1 '^  url' Casks/vmux.rb | sed 's/.*"\(.*\)".*/\1/')
            EXPECTED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Vmux_${VERSION}_aarch64.dmg"
            if [ "$asset_count" -ge 4 ] && [ "$CASK_URL" = "$EXPECTED_URL" ]; then
              echo "Draft release ready and cask matches; release prep already complete."
              echo "PREP_DONE=1" >> "$GITHUB_ENV"
            fi
          fi

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-mac

      - name: Cache cargo binaries
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-dx${{ env.DIOXUS_CLI_VERSION }}-cp0.11.9-cef${{ env.CEF_VERSION }}-v3

      - name: Cache binaryen
        uses: actions/cache@v5
        with:
          path: .dx/tools/binaryen-${{ env.BINARYEN_VERSION }}
          key: binaryen-${{ runner.os }}-${{ runner.arch }}-${{ env.BINARYEN_VERSION }}

      - name: Cache CEF framework
        uses: actions/cache@v5
        with:
          path: ~/.local/share/Chromium Embedded Framework.framework
          key: cef-${{ runner.os }}-${{ env.CEF_VERSION }}

      - name: Cache tailwindcss
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/tailwindcss
          key: tailwindcss-${{ runner.os }}-${{ env.TAILWINDCSS_VERSION }}

      - name: Add ~/.local/bin to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install CEF framework
        run: |
          if [ ! -d "$HOME/.local/share/Chromium Embedded Framework.framework" ]; then
            command -v export-cef-dir >/dev/null 2>&1 || cargo install export-cef-dir@${{ env.CEF_VERSION }}
            export-cef-dir --force "$HOME/.local/share"
          fi

      - name: Install dioxus-cli
        run: ./scripts/install-dioxus-cli.sh

      - name: Install binaryen
        run: ./scripts/install-dioxus-binaryen.sh

      - name: Install bevy_cef bundle tool
        run: command -v bevy_cef_bundle_app >/dev/null 2>&1 || cargo install bevy_cef_bundle_app

      - name: Install cargo-packager (patched for macOS Tahoe)
        run: |
          if ! cargo-packager --version 2>/dev/null | grep -q '0.11.9'; then
            cargo install --path patches/cargo-packager-0.11.8 --locked --force
          fi

      - name: Install tailwindcss
        run: TAILWINDCSS_INSTALL_DIR="$HOME/.local/bin" ./scripts/install-tailwindcss.sh

      - name: Build, sign, notarize, and package DMG
        if: env.PREP_DONE != '1'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VMUX_UPDATE_PUBLIC_KEY: ${{ secrets.VMUX_UPDATE_PUBLIC_KEY }}
        run: ./scripts/build-mac-release.sh

      - name: Smoke test bundled app
        if: env.PREP_DONE != '1'
        run: |
          set -uo pipefail
          app="target/release/Vmux.app"
          bin="$app/Contents/MacOS/vmux_desktop"
          plist="$app/Contents/Frameworks/Chromium Embedded Framework.framework/Resources/Info.plist"

          want="${CEF_VERSION##*+}"
          got=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$plist" 2>/dev/null || true)
          echo "Bundled CEF framework: ${got:-<none>} | cef crate: $CEF_VERSION (expect prefix $want)"
          case "$got" in
            "$want" | "$want".*) ;;
            *)
              echo "::error::Bundled CEF (${got:-<none>}) does not match cef crate ($CEF_VERSION)"
              exit 1
              ;;
          esac

          HOME="$(mktemp -d)"
          export HOME
          log="$(mktemp)"
          "$bin" >"$log" 2>&1 &
          pid=$!
          rc=0
          sleep 25
          if kill -0 "$pid" 2>/dev/null; then
            echo "Vmux survived the 25s startup window — OK"
          else
            wait "$pid"
            code=$?
            echo "::error::Vmux exited during startup (exit $code) — startup crash"
            rc=1
          fi

          kill "$pid" 2>/dev/null || true
          pkill -f "Vmux.app/Contents/MacOS/vmux_desktop" 2>/dev/null || true
          pkill -f "vmux_service" 2>/dev/null || true
          pkill -f "Chromium Embedded Framework" 2>/dev/null || true

          echo "----- startup log -----"
          cat "$log" || true
          exit $rc

      - name: Upload .dmg artifact
        if: env.PREP_DONE != '1' && env.IS_RELEASE_PR != '1'
        uses: actions/upload-artifact@v6
        with:
          name: Vmux-${{ github.sha }}.dmg
          path: target/release/Vmux_*.dmg
          retention-days: 7

      - name: Create binary tarball
        if: env.PREP_DONE != '1' && env.IS_RELEASE_PR == '1'
        run: |
          cd target/release/Vmux.app/Contents/MacOS
          tar czf "$GITHUB_WORKSPACE/target/release/vmux-v${VERSION}-aarch64-apple-darwin.tar.gz" vmux_desktop

      - name: Create app bundle tarball
        if: env.PREP_DONE != '1' && env.IS_RELEASE_PR == '1'
        run: |
          cd target/release
          tar czf "Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz" Vmux.app

      - name: Sign update artifact (minisign)
        if: env.PREP_DONE != '1' && env.IS_RELEASE_PR == '1'
        env:
          VMUX_UPDATE_PRIVATE_KEY: ${{ secrets.VMUX_UPDATE_PRIVATE_KEY }}
          VMUX_UPDATE_PRIVATE_KEY_PASSWORD: ${{ secrets.VMUX_UPDATE_PRIVATE_KEY_PASSWORD }}
        run: |
          TARBALL="target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz"
          cargo packager signer sign "${TARBALL}" \
            --private-key "${VMUX_UPDATE_PRIVATE_KEY}" \
            --password "${VMUX_UPDATE_PRIVATE_KEY_PASSWORD}"

      - name: Create or update draft release with assets
        if: env.PREP_DONE != '1' && env.IS_RELEASE_PR == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ASSETS=(
            "target/release/Vmux_${VERSION}_aarch64.dmg"
            "target/release/vmux-v${VERSION}-aarch64-apple-darwin.tar.gz"
            "target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz"
            "target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz.sig"
          )
          if gh release view "$TAG" --json isDraft >/tmp/r.json 2>/dev/null; then
            is_draft=$(jq -r .isDraft /tmp/r.json)
            if [ "$is_draft" != "true" ]; then
              echo "::error::Release $TAG already published; refusing to upload."
              exit 1
            fi
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --draft \
              --target "$HEAD_SHA" \
              --title "Vmux $TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
