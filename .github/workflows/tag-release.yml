name: Tag Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: tag-release-main
  cancel-in-progress: false

jobs:
  tag-release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid Cargo.toml version: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Check version changed
        run: |
          PREV_VERSION=$(git show "${RELEASE_SHA}^:Cargo.toml" 2>/dev/null | grep -m1 '^version' | sed 's/.*"\(.*\)".*/\1/' || true)
          if [ "$PREV_VERSION" = "$VERSION" ]; then
            echo "Cargo.toml version unchanged; skipping tag."
            echo "SHOULD_TAG=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "SHOULD_TAG=true" >> "$GITHUB_ENV"

      - name: Verify tag does not exist
        if: env.SHOULD_TAG == 'true'
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag already exists locally: $TAG"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag already exists on origin: $TAG"
            exit 1
          fi

      - name: Create and push tag
        if: env.SHOULD_TAG == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$RELEASE_SHA" -m "Vmux $TAG"
          git push origin "$TAG"
