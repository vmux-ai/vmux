name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/install.sh"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            website/target
          key: website-${{ hashFiles('website/Cargo.lock') }}
          restore-keys: website-

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --locked --version 0.7.4

      - name: Build website
        working-directory: website
        run: dx build --platform web --release

      - name: Copy CNAME to dist
        run: cp website/CNAME website/target/dx/vmux_website/release/web/public/CNAME

      - name: Copy install script to dist
        run: install -m 0644 scripts/install.sh website/target/dx/vmux_website/release/web/public/install

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/target/dx/vmux_website/release/web/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
