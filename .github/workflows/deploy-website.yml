name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/install.sh"
      - "scripts/install-dioxus-cli.sh"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  TAILWINDCSS_VERSION: "4.2.4"
  DIOXUS_CLI_VERSION: "0.7.4"
  BINARYEN_VERSION: "127"
  DX_HOME: ${{ github.workspace }}/.dx

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: website
          shared-key: deploy-website

      - name: Cache tailwindcss
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/tailwindcss
          key: tailwindcss-${{ runner.os }}-${{ env.TAILWINDCSS_VERSION }}

      - name: Cache binaryen
        uses: actions/cache@v4
        with:
          path: .dx/tools/binaryen-${{ env.BINARYEN_VERSION }}
          key: binaryen-${{ runner.os }}-${{ runner.arch }}-${{ env.BINARYEN_VERSION }}

      - name: Add ~/.local/bin to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dioxus-cli
        run: ./scripts/install-dioxus-cli.sh

      - name: Install Binaryen
        run: ./scripts/install-dioxus-binaryen.sh

      - name: Install Tailwind CSS
        run: TAILWINDCSS_INSTALL_DIR="$HOME/.local/bin" ./scripts/install-tailwindcss.sh

      - name: Build Tailwind CSS
        working-directory: website
        run: tailwindcss -i tailwind.input.css -o public/style.css --minify

      - name: Build website (SSG)
        working-directory: website
        run: |
          rm -rf target/dx
          dx build --platform web --ssg --release

      - name: Promote SSG home to root
        working-directory: website
        run: |
          cp target/dx/vmux_website/release/web/public/_home/index.html target/dx/vmux_website/release/web/public/index.html
          rm -rf target/dx/vmux_website/release/web/public/_home

      - name: Copy CNAME to dist
        run: cp website/CNAME website/target/dx/vmux_website/release/web/public/CNAME

      - name: Copy install script to dist
        run: install -m 0644 scripts/install.sh website/target/dx/vmux_website/release/web/public/install

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/target/dx/vmux_website/release/web/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
