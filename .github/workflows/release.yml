name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Verify Cargo.toml version matches
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "Error: Cargo.toml version ($CARGO_VERSION) does not match ($VERSION)" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --locked --version 0.7.4

      - name: Install CEF framework
        run: |
          cargo install export-cef-dir@145.6.1+145.0.28 --force
          export-cef-dir --force "$HOME/.local/share"

      - name: Install bevy_cef tools
        run: |
          cargo install bevy_cef_render_process
          cargo install bevy_cef_bundle_app

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Free build artifacts before packaging
        run: |
          df -h
          rm -rf target
          df -h

      - name: Create and push tag
        if: ${{ inputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Install cargo-packager (patched for macOS Tahoe)
        run: cargo install --path patches/cargo-packager-0.11.8

      - name: Build, sign, notarize, and package DMG
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/build-mac-release.sh

      - name: Create binary tarball
        run: |
          cd target/release/Vmux.app/Contents/MacOS
          tar czf "$GITHUB_WORKSPACE/target/release/vmux-v${VERSION}-aarch64-apple-darwin.tar.gz" Vmux

      - name: Create app bundle tarball
        run: |
          cd target/release
          tar czf "Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz" Vmux.app

      - name: Sign update artifact (minisign)
        env:
          VMUX_UPDATE_PRIVATE_KEY: ${{ secrets.VMUX_UPDATE_PRIVATE_KEY }}
          VMUX_UPDATE_PRIVATE_KEY_PASSWORD: ${{ secrets.VMUX_UPDATE_PRIVATE_KEY_PASSWORD }}
        run: |
          TARBALL="target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz"
          cargo packager signer sign "${TARBALL}" \
            --private-key "${VMUX_UPDATE_PRIVATE_KEY}" \
            --password "${VMUX_UPDATE_PRIVATE_KEY_PASSWORD}"
          # Produces ${TARBALL}.sig

      - name: Generate update manifest
        run: |
          TARBALL="target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz"
          SIG=$(cat "${TARBALL}.sig")
          URL="https://github.com/vmux-ai/vmux/releases/download/v${VERSION}/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > target/release/update-manifest.json <<EOF
          {
            "version": "v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${URL}",
                "signature": "${SIG}",
                "format": "app"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_PATH=$(ls target/release/Vmux_*.dmg)
          gh release create "v${VERSION}" \
            --title "Vmux v${VERSION}" \
            --generate-notes \
            "$DMG_PATH" \
            "target/release/vmux-v${VERSION}-aarch64-apple-darwin.tar.gz" \
            "target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz" \
            "target/release/Vmux-v${VERSION}-aarch64-apple-darwin.app.tar.gz.sig" \
            "target/release/update-manifest.json"

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_PATH=$(ls target/release/Vmux_*.dmg)
          DMG_NAME=$(basename "$DMG_PATH")
          DMG_SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/vmux.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${DMG_SHA}\"/" Casks/vmux.rb
          sed -i '' "s|/v[^/]*/.*\.dmg|/v${VERSION}/${DMG_NAME}|" Casks/vmux.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/vmux.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew cask to ${VERSION}"
          git push
